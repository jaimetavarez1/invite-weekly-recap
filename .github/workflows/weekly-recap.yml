name: PE Recap System — Weekly Recap

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode — full rewrites the week; refresh adds new items without removing existing'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - refresh

jobs:
  generate-recap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate recap
        env:
          SLACK_BOT_TOKEN: ${{ secrets.slack_bot_token }}
          RECAP_GH_TOKEN: ${{ secrets.RECAP_GH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.ANTHROP_TOKEN }}
          MODE: ${{ github.event.inputs.mode || 'full' }}
        run: python3 scripts/generate_recap.py

# Recaps are now initiated manually by each PE through Cowork (Claude), which
# uses their own Slack MCP connector to read all channels they are a member of
# (public and private) — no bot invite required.
#
# This workflow_dispatch trigger is kept for admin/debug use only.
#
# No deploy/build step here on purpose — the site is plain index.html at the
# repo root, and GitHub Pages (Settings > Pages > Deploy from branch > main / root)
# serves it directly whenever main updates.
