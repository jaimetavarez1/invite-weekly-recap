name: PE Recap System — Daily Health Check

on:
  schedule:
    - cron: "0 14 * * *"   # 7am PT / 10am ET daily
  workflow_dispatch:        # allow manual runs

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Run health checks
        id: checks
        env:
          GH_TOKEN: ${{ secrets.RECAP_GH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.RECAP_SLACK_BOT_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, datetime, re, os, sys

          TOKEN = os.environ["GH_TOKEN"]
          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          REPO = "jaimetavarez1/invite-weekly-recap"
          API = "https://api.github.com"
          SLACK_USER = "U02E8CN9Z7V"

          results = {}

          # ── Check 1: GitHub token — valid and has push access ──────────────
          try:
              req = urllib.request.Request(f"{API}/repos/{REPO}",
                  headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"})
              with urllib.request.urlopen(req) as r:
                  repo = json.loads(r.read())
              assert repo.get("permissions", {}).get("push"), "Token lacks push access"
              results["Check 1: GitHub token"] = "PASS"
          except Exception as e:
              results["Check 1: GitHub token"] = f"FAIL: {e}"

          # ── Check 2: Bootstrapper URLs ──────────────────────────────────────
          try:
              for skill in ["weekly-recap", "setup"]:
                  url = f"https://raw.githubusercontent.com/{REPO}/main/skills/{skill}/SKILL.md"
                  with urllib.request.urlopen(url) as r:
                      content = r.read().decode()
                  assert len(content) > 500, f"{skill} SKILL.md too short ({len(content)} chars)"
              results["Check 2: Bootstrapper URLs"] = "PASS"
          except Exception as e:
              results["Check 2: Bootstrapper URLs"] = f"FAIL: {e}"

          # ── Check 3: Timestamp integrity ────────────────────────────────────
          try:
              req = urllib.request.Request(f"{API}/repos/{REPO}/contents/skills/weekly-recap/SKILL.md",
                  headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"})
              with urllib.request.urlopen(req) as r:
                  skill = base64.b64decode(json.loads(r.read())["content"]).decode()
              assert not re.findall(r'\boldest\s*=\s*["\']?(\d{10})', skill), "Hardcoded epoch found in SKILL.md"
              assert "utcnow()" in skill, "utcnow() missing from SKILL.md"
              assert '"<ISO timestamp>"' not in skill, "Old ISO placeholder still present in SKILL.md"
              assert "utcnow().isoformat" in skill, "utcnow().isoformat instruction missing"
              results["Check 3: Timestamp integrity"] = "PASS"
          except Exception as e:
              results["Check 3: Timestamp integrity"] = f"FAIL: {e}"

          # ── Check 4: Data file integrity ────────────────────────────────────
          try:
              def api_file(path):
                  req = urllib.request.Request(f"{API}/repos/{REPO}/contents/{path}",
                      headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"})
                  with urllib.request.urlopen(req) as r:
                      f = json.loads(r.read())
                  return json.loads(base64.b64decode(f["content"]).decode())

              for fname in ["shared.json", "jaime.json", "teresa.json", "kebone.json", "lisa.json"]:
                  d = api_file(f"data/{fname}")
                  ts = d.get("refreshedAt", "")
                  ts_dt = datetime.datetime.fromisoformat(ts.replace("Z","").split(".")[0])
                  is_midnight = ts_dt.hour == 0 and ts_dt.minute == 0 and ts_dt.second == 0
                  req_keys = ["week","refreshedAt","orgPolicy"] if fname == "shared.json" else ["pe","week","refreshedAt","updates"]
                  missing = [k for k in req_keys if k not in d]
                  assert not is_midnight, f"{fname}: midnight timestamp detected (placeholder was not replaced)"
                  assert not missing, f"{fname}: missing required keys {missing}"
              results["Check 4: Data file integrity"] = "PASS"
          except Exception as e:
              results["Check 4: Data file integrity"] = f"FAIL: {e}"

          # ── Check 5: GitHub write access — round-trip write/delete ──────────
          try:
              tc = json.dumps({"healthcheck": True, "ts": datetime.datetime.utcnow().isoformat()+"Z"})
              body = json.dumps({"message": "healthcheck: write test",
                  "content": base64.b64encode(tc.encode()).decode()}).encode()
              req = urllib.request.Request(f"{API}/repos/{REPO}/contents/data/_healthcheck.json",
                  data=body, method="PUT",
                  headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json",
                           "Content-Type": "application/json"})
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read())["content"]["sha"]
              db = json.dumps({"message": "healthcheck: cleanup", "sha": sha}).encode()
              req2 = urllib.request.Request(f"{API}/repos/{REPO}/contents/data/_healthcheck.json",
                  data=db, method="DELETE",
                  headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json",
                           "Content-Type": "application/json"})
              with urllib.request.urlopen(req2) as r:
                  json.loads(r.read())
              results["Check 5: GitHub write access"] = "PASS"
          except Exception as e:
              results["Check 5: GitHub write access"] = f"FAIL: {e}"

          # ── Check 6: Live artifact ──────────────────────────────────────────
          try:
              req = urllib.request.Request(f"{API}/repos/{REPO}/contents/index.html",
                  headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"})
              with urllib.request.urlopen(req) as r:
                  html = base64.b64decode(json.loads(r.read())["content"]).decode()
              assert "owner: 'jaimetavarez1'" in html, "Wrong GH owner in artifact"
              assert "repo: 'invite-weekly-recap'" in html, "Wrong GH repo in artifact"
              assert "flex-wrap:nowrap" in html, "Filter bar is wrapping — Kebone will fall to second line"
              assert "Jaime · Engineering" in html, "Jaime label shows wrong org"
              assert "Kebone · PM · Design · Data" in html, "Kebone label is wrong"
              results["Check 6: Live artifact"] = "PASS"
          except Exception as e:
              results["Check 6: Live artifact"] = f"FAIL: {e}"

          # ── Report ──────────────────────────────────────────────────────────
          failures = {k: v for k, v in results.items() if not v.startswith("PASS")}

          if not failures:
              print("All checks passed. Staying silent.")
              sys.exit(0)

          # Build Slack DM
          now_utc = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          lines = "\n".join(f"• *{k}*: {v}" for k, v in failures.items())
          msg = (
              f":rotating_light: *PE Recap System — Daily Health Check FAILED*\n\n"
              f"One or more checks failed at {now_utc}:\n\n{lines}\n\n"
              f"*What to do:* Investigate — the weekly recap may not run correctly for PEs until this is resolved.\n"
              f"*Repo:* https://github.com/jaimetavarez1/invite-weekly-recap"
          )

          payload = json.dumps({"channel": SLACK_USER, "text": msg}).encode()
          slack_req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=payload,
              headers={
                  "Authorization": f"Bearer {SLACK_TOKEN}",
                  "Content-Type": "application/json",
              }
          )
          with urllib.request.urlopen(slack_req) as r:
              resp = json.loads(r.read())
          if not resp.get("ok"):
              print(f"Slack DM failed: {resp}", file=sys.stderr)
              sys.exit(2)

          print(f"DM sent. Failures: {list(failures.keys())}")
          sys.exit(1)   # fail the workflow so it shows red in GH Actions UI
          PYEOF
