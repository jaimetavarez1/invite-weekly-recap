<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Recruiting Recap</title>
  <style>
    :root {
      color-scheme: light;
      --t:#F45D48; --t-dk:#C63627; --t-lt:#FEF0EE; --t-md:#FBCFC9;
      --g:#2C7A55; --g-lt:#E8F5EF;
      --a:#C47A15; --a-lt:#FFF3E0;
      --bg:#F3F0EC; --surf:#FFFFFF;
      --bd:#E2DBD3; --bd2:#CEC5BC;
      --tx:#17140D; --tx2:#57504A; --tx3:#A09890;
      --r:999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Circular','DM Sans',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
    .hidden-item{display:none!important}

    /* Header */
    .hdr{background:var(--surf);border-bottom:1px solid var(--bd);padding:0 28px;position:sticky;top:0;z-index:20}
    .hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:15px 0}
    .brand{display:flex;align-items:center;gap:11px}
    .g-mark{width:36px;height:36px;border-radius:10px;background:var(--t);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
    .brand-info{display:flex;flex-direction:column;gap:3px}
    .brand-title{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-0.3px;line-height:1.1}
    .brand-meta{display:flex;align-items:center;gap:7px}
    .brand-sub{font-size:11px;color:var(--tx3)}
    .week-chip{font-size:10.5px;font-weight:700;background:var(--t-lt);color:var(--t-dk);border:1px solid var(--t-md);border-radius:var(--r);padding:2px 9px}
    .refresh-btn{display:flex;align-items:center;gap:5px;background:transparent;color:var(--tx2);border:1.5px solid var(--bd2);border-radius:var(--r);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .refresh-btn:hover{border-color:var(--t);color:var(--t);background:var(--t-lt)}
    .refresh-btn:disabled{opacity:.4;cursor:not-allowed}

    /* Layout */
    .page-body{max-width:820px;margin:0 auto;padding:32px 24px 80px}

    /* Loading */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;text-align:center}
    .spinner{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--t);border-radius:50%;animation:spin .85s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-msg{color:var(--tx3);font-size:13px}
    .dots{display:flex;gap:6px;margin-top:14px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--bd);transition:background .3s}
    .dot.done{background:var(--t)}
    .dot.active{background:var(--t);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Error */
    .error-box{background:var(--t-lt);border:1px solid var(--t-md);border-radius:12px;padding:14px 18px;color:var(--t-dk);font-size:13px;margin-bottom:24px}

    /* Section */
    .section{margin-bottom:40px}
    .sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .sec-hd-text{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx2);white-space:nowrap}
    .sec-hd-line{flex:1;height:1px;background:var(--bd)}

    /* Card */
    .card{background:var(--surf);border-radius:16px;border:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);overflow:hidden}

    /* Policy */
    .p-item{display:flex;border-bottom:1px solid var(--bd);transition:background .12s}
    .p-item:last-child{border-bottom:none}
    .p-bar{width:4px;flex-shrink:0}
    .p-bar-high{background:var(--t)}
    .p-bar-medium{background:var(--a)}
    .p-bar-low{background:var(--g)}
    .p-body{padding:18px 20px 18px 18px;flex:1;min-width:0}
    .p-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
    .p-title{font-size:14px;font-weight:700;color:var(--tx);line-height:1.35}
    .badge{font-size:10px;padding:3px 9px;border-radius:var(--r);font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
    .badge-high{background:var(--t-lt);color:var(--t-dk)}
    .badge-medium{background:var(--a-lt);color:var(--a)}
    .badge-low{background:var(--g-lt);color:var(--g)}
    .p-summary{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:4px}
    .p-bullets{list-style:none;padding:0;margin:8px 0 0;display:flex;flex-direction:column;gap:5px}
    .p-bullets li{display:flex;gap:9px;font-size:13px;color:var(--tx2);line-height:1.6}
    .p-bullets li::before{content:'•';color:var(--bd2);flex-shrink:0;font-size:15px;line-height:1.4}
    .source-pill{display:inline-flex;align-items:center;margin-top:10px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:3px 10px;font-size:11px;color:var(--tx3);text-decoration:none;transition:all .12s}
    a.source-pill{color:var(--t);border-color:var(--t-md);background:var(--t-lt)}
    a.source-pill:hover{opacity:.8;text-decoration:underline}

    /* Events */
    .ev-group{border-bottom:1px solid var(--bd)}
    .ev-group:last-child{border-bottom:none}
    .ev-theme-bar{display:flex;align-items:center;gap:10px;padding:14px 20px 8px}
    .ev-theme-chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:3px 10px;border-radius:var(--r);background:var(--bg);color:var(--tx2);border:1px solid var(--bd2)}
    .ev-items{padding:0 20px 14px;display:flex;flex-direction:column;gap:0}
    .ev-item{display:flex;gap:13px;padding:10px 0;border-bottom:1px solid var(--bd)}
    .ev-item:last-child{border-bottom:none}
    .ev-dot-col{flex-shrink:0;padding-top:6px}
    .ev-dot{width:6px;height:6px;border-radius:50%;background:var(--t)}
    .ev-body{flex:1;min-width:0}
    .ev-heading{font-size:13.5px;font-weight:700;color:var(--tx);line-height:1.4;margin-bottom:7px}
    .ev-bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
    .ev-bullets li{display:flex;gap:9px;font-size:13px;color:var(--tx2);line-height:1.6}
    .ev-bullets li::before{content:'•';color:var(--bd2);flex-shrink:0;font-size:15px;line-height:1.4}
    .ev-src{display:inline-flex;margin-top:8px;font-size:11px;color:var(--tx3);font-style:italic;text-decoration:none}
    a.ev-src{color:var(--t)}
    a.ev-src:hover{text-decoration:underline}
    .ev-summary{font-size:13px;color:var(--tx2);line-height:1.6}

    /* PE tabs */
    .pe-nav{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none;background:#FAFAF8;padding:0 4px}
    .pe-nav::-webkit-scrollbar{display:none}
    .pe-tab{display:flex;align-items:center;gap:7px;padding:12px 16px;font-size:12.5px;font-weight:500;color:var(--tx3);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
    .pe-tab:hover{color:var(--tx2)}
    .pe-tab.active{color:var(--tx);border-bottom-color:var(--t);font-weight:700}
    .pe-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;flex-shrink:0}
    .pe-tab.active .pe-avatar{box-shadow:0 0 0 2px var(--t-md)}
    .pe-panel{display:none}
    .pe-panel.active{display:block}
    .pe-item{padding:16px 20px;border-bottom:1px solid var(--bd)}
    .pe-item:last-child{border-bottom:none}
    .pe-item-hd{font-size:13.5px;font-weight:700;color:var(--tx);line-height:1.35;margin-bottom:8px}
    .pe-bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
    .pe-bullets li{display:flex;gap:9px;font-size:13px;color:var(--tx2);line-height:1.6}
    .pe-bullets li::before{content:'•';color:var(--bd2);flex-shrink:0;font-size:15px;line-height:1.4}
    .gap-note{background:#FFFBF2;border-left:3px solid var(--a);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#7A5010;margin:10px 0 4px}

    /* Inline priority tag */
    .itp-tag{display:inline-flex;align-items:center;margin-top:10px;border-radius:var(--r);padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

    /* Selectable */
    .sel-wrap{cursor:pointer;position:relative;transition:background .12s}
    .sel-wrap:hover{background:#F7F3EF}
    .sel-wrap.selected{background:var(--t-lt)}
    .sel-indicator{position:absolute;top:16px;right:16px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .12s}
    .sel-wrap:hover .sel-indicator{border-color:var(--t)}
    .sel-wrap.selected .sel-indicator{background:var(--t);border-color:var(--t);color:white}

    /* Floating action bar */
    .fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;background:#17140D;color:white;border-radius:var(--r);padding:10px 8px 10px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 28px rgba(0,0,0,.28);transition:opacity .2s,transform .2s;z-index:100;white-space:nowrap}
    .fab.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
    .fab-count{font-size:13px;font-weight:600}
    .fab-clear{font-size:12px;background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;transition:color .15s}
    .fab-clear:hover{color:white}
    .fab-sep{width:1px;height:18px;background:rgba(255,255,255,.18)}
    .fab-btn{background:var(--t);color:white;border:none;border-radius:var(--r);padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
    .fab-btn:hover{background:var(--t-dk)}
    .fab-btn:disabled{opacity:.5;cursor:not-allowed}

    /* Summary panel */
    .sum-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .sum-overlay.open{display:flex}
    .sum-panel{background:var(--surf);border-radius:20px 20px 0 0;padding:24px 24px 36px;width:100%;max-height:78vh;overflow-y:auto;box-shadow:0 -4px 32px rgba(0,0,0,.14)}
    .sum-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .sum-title{font-size:15px;font-weight:700;color:var(--tx)}
    .sum-close{background:var(--bg);border:1px solid var(--bd);border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .15s}
    .sum-close:hover{background:var(--bd);color:var(--tx)}
    .sum-loading{display:flex;align-items:center;gap:10px;color:var(--tx3);font-size:13px;padding:12px 0}
    .sum-spinner{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--t);border-radius:50%;animation:spin .85s linear infinite;flex-shrink:0}
    .sum-output{font-size:13.5px;color:var(--tx);line-height:1.8;background:#FAFAF8;border:1px solid var(--bd);border-radius:12px;padding:18px 20px;word-break:break-word;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .sum-output strong{font-weight:700;color:var(--tx)}
    .sum-output em{font-style:italic;color:var(--tx2)}
    .sum-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .sum-copy-btn{background:var(--t);color:white;border:none;border-radius:var(--r);padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
    .sum-copy-btn:hover{background:var(--t-dk)}
    .sum-copy-btn.copied{background:var(--g)}

    .empty{color:var(--tx3);font-size:13px;font-style:italic;padding:8px 0}
  </style>
</head>
<body>

<!-- Floating action bar -->
<div class="fab" id="fab">
  <span class="fab-count" id="fabCount">0 selected</span>
  <button class="fab-clear" onclick="clearSelection()">Clear</button>
  <div class="fab-sep"></div>
  <button class="fab-btn" id="fabBtn" onclick="openSummary()">✦ Summarize for Slack</button>
</div>

<!-- Summary panel -->
<div class="sum-overlay" id="sumOverlay" onclick="if(event.target===this)closeSummary()">
  <div class="sum-panel">
    <div class="sum-header">
      <div class="sum-title">Slack summary</div>
      <button class="sum-close" onclick="closeSummary()">✕</button>
    </div>
    <div id="sumLoading" class="sum-loading" style="display:none">
      <div class="sum-spinner"></div> Writing your Slack message...
    </div>
    <div id="sumOutput" class="sum-output" style="display:none"></div>
    <div class="sum-actions" id="sumActions" style="display:none">
      <button class="sum-copy-btn" id="sumCopyBtn" onclick="copySummary()">📋 Copy message</button>
    </div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="g-mark">G</div>
      <div class="brand-info">
        <div class="brand-title">Weekly recruiting recap</div>
        <div class="brand-meta">
          <div class="brand-sub" id="sub">Jaime Tavarez &middot; R&amp;D Invite</div>
          <div class="week-chip" id="weekChip"></div>
        </div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="refresh-btn" id="refreshBtn" onclick="loadRecap()">&#8635; Refresh</button>
    </div>
  </div>
</div>

<div class="page-body">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadMsg">Loading recap...</div>
    <div class="dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
  </div>
  <div id="errBox" class="error-box" style="display:none"></div>
  <div id="content" style="display:none"></div>
</div>

<script>
  const PE_META = {
    jaime:    { label: 'Jaime', sub: 'R&D', initials: 'JT', bg: '#FEF0EE', color: '#C63627' },
    teresa:   { label: 'Teresa', sub: 'Foundation', initials: 'TW', bg: '#E8F5EF', color: '#2C7A55' },
    lisa:     { label: 'Lisa', sub: 'GTM', initials: 'LP', bg: '#FEF4E6', color: '#C47A15' },
    michelle: { label: 'Michelle', sub: 'CX', initials: 'MC', bg: '#EEF2FB', color: '#3B6FD4' },
    kebone:   { label: 'Kebone', sub: 'PM/PD', initials: 'KM', bg: '#F2EDFB', color: '#7C4FBF' }
  };

  const SECTION_LABELS = [
    { num: '1', title: 'Org &amp; policy updates' },
    { num: '2', title: 'Key events &amp; decisions' },
    { num: '3', title: 'PE org updates' },
    { num: '4', title: 'Talking points' }
  ];

  function setStep(msg, step) {
    document.getElementById('loadMsg').textContent = msg;
    [0,1,2,3].forEach(i => {
      const d = document.getElementById('d' + i);
      d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
    });
  }

  function showErr(msg) {
    document.getElementById('loading').style.display = 'none';
    const b = document.getElementById('errBox');
    b.style.display = 'block';
    b.textContent = '⚠️ ' + msg;
    document.getElementById('refreshBtn').disabled = false;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmt(s) {
    return esc(s)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function spill(source, url) {
    if (url) return `<a href="${esc(url)}" class="source-pill" target="_blank">${esc(source)}</a>`;
    return `<span class="source-pill">${esc(source)}</span>`;
  }

  // ── Selection ──────────────────────────────
  let selCount = 0;
  let summaryText = '';

  function toggleSel(el, content) {
    el.classList.toggle('selected');
    selCount = document.querySelectorAll('.sel-wrap.selected').length;
    document.getElementById('fabCount').textContent = selCount + (selCount === 1 ? ' item selected' : ' items selected');
    document.getElementById('fab').classList.toggle('show', selCount > 0);
  }

  function clearSelection() {
    document.querySelectorAll('.sel-wrap.selected').forEach(el => el.classList.remove('selected'));
    selCount = 0;
    document.getElementById('fab').classList.remove('show');
  }

  function openSummary() {
    const items = [];
    document.querySelectorAll('.sel-wrap.selected').forEach(el => {
      const c = el.dataset.summary;
      if (c) items.push(c);
    });
    if (!items.length) return;
    document.getElementById('sumOverlay').classList.add('open');
    document.getElementById('sumOutput').style.display = 'none';
    document.getElementById('sumActions').style.display = 'none';
    document.getElementById('sumLoading').style.display = 'flex';
    summaryText = '';

    window.cowork.askClaude(
      `You are writing a Slack message for Jaime Tavarez, an Invite PE at Gusto, to share with their recruiting team.

Write a structured, scannable Slack message using EXACTLY this format:

*This week's round-up 👇*

_Asks_
• 📌 *Key term or topic* — brief description
    • Supporting detail or action needed
    • Another sub-point if needed

_Updates_
• 🎯 *Key update* — brief description
    • Detail or context

Please reply with a *yes* once you've read through! 🙌

RULES:
- Open with *This week's round-up 👇* (bold, on its own line)
- Use _Asks_ for action items and _Updates_ for informational updates (italic headers on their own line)
- Each main bullet MUST be on ONE line: emoji + *bold key term* + space + dash + description. NEVER put just a bold title alone on a bullet line with no description. NEVER split the title onto one line and the description onto the next
- Sub-bullets (indented with 4 spaces, then •): one specific detail or action per sub-bullet
- Use *bold* for names, dates, tool names, and anything requiring action
- Leave a blank line between each section
- Close with "Please reply with a *yes* once you've read through! 🙌"
- NEVER write a paragraph — every piece of info goes in a bullet or sub-bullet
- NEVER mention the same topic, event, or update more than once across the entire message. If something has both an action (e.g. complete prep) and context (e.g. session date), combine them into ONE bullet with sub-bullets — do not split it across Asks and Updates
- Before writing, mentally group all updates by topic. If two items are about the same thing, merge them into one bullet
- Return ONLY the message — no explanation, no code fences`,
      items.map((item, i) => ({ label: `Update ${i+1}`, content: item }))
    ).then(result => {
      // Extract plain text from whatever askClaude returns
      let raw = result;
      if (typeof raw !== 'string') {
        // Could be {text:...}, {content:...}, [{text:...}], etc.
        if (raw && raw.text) raw = raw.text;
        else if (raw && raw.content) raw = Array.isArray(raw.content) ? raw.content.map(c => c.text||'').join('') : raw.content;
        else if (Array.isArray(raw)) raw = raw.map(c => c.text||c).join('');
        else raw = JSON.stringify(raw);
      }
      // Normalize literal \n and strip any leftover JSON wrapper chars
      summaryText = String(raw).replace(/\\n/g, '\n').replace(/^["']|["']$/g, '').trim();
      document.getElementById('sumLoading').style.display = 'none';
      const out = document.getElementById('sumOutput');
      out.innerHTML = slackFmt(summaryText);
      out.style.display = 'block';
      document.getElementById('sumActions').style.display = 'flex';
    }).catch(err => {
      document.getElementById('sumLoading').style.display = 'none';
      document.getElementById('sumOutput').textContent = 'Error generating summary. Please try again.';
      document.getElementById('sumOutput').style.display = 'block';
    });
  }

  function closeSummary() {
    document.getElementById('sumOverlay').classList.remove('open');
  }

  function copySummary() {
    navigator.clipboard.writeText(summaryText).then(() => {
      const btn = document.getElementById('sumCopyBtn');
      btn.textContent = '✓ Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '📋 Copy message'; btn.classList.remove('copied'); }, 2000);
    });
  }

  let selId = 0;
  function selWrap(innerHtml, summaryContent) {
    const id = 'sw-' + (selId++);
    const safe = (summaryContent || '').replace(/"/g, '&quot;');
    return `<div class="sel-wrap" id="${id}" data-summary="${safe}" onclick="toggleSel(this, this.dataset.summary)">
      ${innerHtml}
      <div class="sel-indicator">✓</div>
    </div>`;
  }

  function toggleTp(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  let itpCount = 0;
  function applyInline(t) {
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>')
      .replace(/_([^_\n]+)_/g, '<em>$1</em>');
  }

  function slackFmt(text) {
    const normalized = String(text || '').replace(/\\n/g, '\n').replace(/\\t/g, '  ');
    const lines = normalized.split('\n');
    let html = '';
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const trimmed = line.trim();
      if (!trimmed) { html += '<div style="height:6px"></div>'; continue; }
      // Bold title line (starts and ends with * but has spaces — e.g. *This week's round-up*)
      if (/^\*[^*].+[^*]\*$/.test(trimmed) || /^\*\*[^*].+[^*]\*\*$/.test(trimmed)) {
        html += `<div style="font-size:15px;font-weight:700;color:var(--tx);margin-bottom:4px">${applyInline(trimmed)}</div>`;
        continue;
      }
      // Italic section header: _Asks_ or _Updates_
      if (/^_[^_]+_$/.test(trimmed)) {
        const label = trimmed.replace(/^_|_$/g, '');
        html += `<div style="font-style:italic;font-weight:600;font-size:14px;color:var(--tx2);margin:10px 0 4px">${esc(label)}</div>`;
        continue;
      }
      // Sub-bullet (indented: spaces then ○ or ◦ or - or •)
      if (/^\s{2,}[○◦•\-]/.test(line) || /^\s{2,}[a-z]/i.test(line) && /^\s{3,}/.test(line)) {
        const inner = trimmed.replace(/^[○◦•\-]\s*/, '');
        html += `<div style="display:flex;gap:8px;padding:2px 0 2px 20px"><span style="flex-shrink:0;color:var(--tx3)">•</span><span style="font-size:13px;color:var(--tx2)">${applyInline(inner)}</span></div>`;
        continue;
      }
      // Main bullet: starts with • or -
      if (/^[•\-]\s/.test(trimmed)) {
        const inner = trimmed.replace(/^[•\-]\s*/, '');
        // If the content is ONLY a bold/italic term with no description, render as header (no bullet)
        const strippedInner = inner.replace(/\*([^*]+)\*/g,'$1').replace(/_([^_]+)_/g,'$1').replace(/:[\w_]+:/g,'').trim();
        if (!strippedInner || strippedInner === strippedInner.replace(/[\s—\-]/g,'').slice(0,3)) {
          html += `<div style="font-weight:700;font-size:13.5px;color:var(--tx);padding:5px 0 2px">${applyInline(inner)}</div>`;
        } else {
          html += `<div style="display:flex;gap:9px;padding:4px 0"><span style="flex-shrink:0;margin-top:1px">•</span><span style="font-size:13.5px;color:var(--tx)">${applyInline(inner)}</span></div>`;
        }
        continue;
      }
      // Closing line or plain text
      html += `<div style="font-size:13.5px;color:var(--tx);padding:2px 0">${applyInline(trimmed)}</div>`;
    }
    return html;
  }
  function itpHtml(tp) {
    if (!tp) return '';
    const clr = tp.priority === 'red' ? 'red' : tp.priority === 'yellow' ? 'yellow' : 'green';
    const lbl = clr === 'red' ? 'Action required' : clr === 'yellow' ? 'Cascade this week' : 'FYI';
    const tagStyle = {
      red:    'background:var(--t-lt);color:var(--t-dk);border:1px solid var(--t-md)',
      yellow: 'background:var(--a-lt);color:#8A5210;border:1px solid #F5C87A',
      green:  'background:var(--g-lt);color:var(--g);border:1px solid #A8D9BE'
    }[clr];
    return `<span class="itp-tag" style="${tagStyle}">${lbl}</span>`;
  }

  function copyItp(btnId, text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '&#128203; Copy message'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function switchPE(key) {
    document.querySelectorAll('.pe-tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
    document.querySelectorAll('.pe-panel').forEach(p => p.classList.toggle('active', p.dataset.key === key));
  }

  // Map org keys to filter tags
  const ORG_FILTERS = [
    { key: 'all',        label: 'All' },

    { key: 'foundation', label: 'Teresa &middot; Foundation' },
    { key: 'gtm',        label: 'Lisa &middot; GTM' },
    { key: 'cx',         label: 'Michelle &middot; CX' },
    { key: 'pm',         label: 'Kebone &middot; PM/PD' }
  ];

  // PE key → filter org key
  const PE_TO_ORG = { jaime:'r&d', teresa:'foundation', lisa:'gtm', michelle:'cx', kebone:'pm' };
  const ORG_TO_PE = { 'r&d':'jaime', foundation:'teresa', gtm:'lisa', cx:'michelle', pm:'kebone' };

  let activeFilter = 'all';

  function tagsFromAudience(audience) {
    const a = (audience || '').toLowerCase();
    if (a.includes('all')) return ['all'];
    const tags = [];
    if (a.includes('r&d') || a.includes('eng') || a.includes('data')) tags.push('r&d');
    if (a.includes('foundation') || a.includes('i&o') || a.includes('finance')) tags.push('foundation');
    if (a.includes('gtm') || a.includes('sales') || a.includes('marketing')) tags.push('gtm');
    if (a.includes('cx') || a.includes('customer')) tags.push('cx');
    if (a.includes('pm') || a.includes('product') || a.includes('design') || a.includes('pd')) tags.push('pm');
    return tags.length ? tags : ['all'];
  }

  function orgAttr(tags) {
    return `data-orgs="${(tags||['all']).join(',')}"`;
  }

  function setFilter(org) {
    activeFilter = org;
    // Update filter button states
    document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.dataset.org === org));

    // Filter policy items
    document.querySelectorAll('.p-item[data-orgs]').forEach(el => {
      const orgs = el.dataset.orgs.split(',');
      el.classList.toggle('hidden-item', org !== 'all' && !orgs.includes('all') && !orgs.includes(org));
    });

    // Filter event groups — hide group if all items hidden
    document.querySelectorAll('.ev-group[data-orgs]').forEach(el => {
      const orgs = el.dataset.orgs.split(',');
      el.classList.toggle('hidden-item', org !== 'all' && !orgs.includes('all') && !orgs.includes(org));
    });

    // Filter talking points
    document.querySelectorAll('.tp[data-orgs]').forEach(el => {
      const orgs = el.dataset.orgs.split(',');
      el.classList.toggle('hidden-item', org !== 'all' && !orgs.includes('all') && !orgs.includes(org));
    });

    if (org !== 'all' && ORG_TO_PE[org]) {
      switchPE(ORG_TO_PE[org]);

  }

    });
    h += `</div></div>`;

    // Section 2 — Policy
    h += `<div class="section">
      <div class="sec-hd"><span class="sec-hd-text">Org &amp; policy updates</span><div class="sec-hd-line"></div></div>
      <div class="card">`;
    if (data.orgPolicy && data.orgPolicy.length) {
      data.orgPolicy.forEach(item => {

Return ONLY valid JSON.`,
