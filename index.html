<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Recruiting Recap</title>
  <style>
    :root {
      color-scheme: light;
      --t:#F45D48; --t-dk:#C63627; --t-lt:#FEF0EE; --t-md:#FBCFC9;
      --g:#2C7A55; --g-lt:#E8F5EF;
      --a:#C47A15; --a-lt:#FFF3E0;
      --bg:#F3F0EC; --surf:#FFFFFF;
      --bd:#E2DBD3; --bd2:#CEC5BC;
      --tx:#17140D; --tx2:#57504A; --tx3:#A09890;
      --r:999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Circular','DM Sans',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
    .hidden-item{display:none!important}

    .hdr{background:var(--surf);border-bottom:1px solid var(--bd);padding:0 28px;position:sticky;top:0;z-index:20}
    .hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:15px 0}
    .brand{display:flex;align-items:center;gap:11px}
    .g-mark{width:36px;height:36px;border-radius:10px;background:var(--t);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
    .brand-info{display:flex;flex-direction:column;gap:3px}
    .brand-title{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-0.3px;line-height:1.1}
    .brand-meta{display:flex;align-items:center;gap:7px}
    .brand-sub{font-size:11px;color:var(--tx3)}
    .week-chip{font-size:10.5px;font-weight:700;background:var(--t-lt);color:var(--t-dk);border:1px solid var(--t-md);border-radius:var(--r);padding:2px 9px}
    .refresh-btn{display:flex;align-items:center;gap:5px;background:transparent;color:var(--tx2);border:1.5px solid var(--bd2);border-radius:var(--r);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .refresh-btn:hover{border-color:var(--t);color:var(--t);background:var(--t-lt)}
    .refresh-btn:disabled{opacity:.4;cursor:not-allowed}

    .page-body{max-width:820px;margin:0 auto;padding:32px 24px 80px}

    .error-box{background:var(--t-lt);border:1px solid var(--t-md);border-radius:12px;padding:14px 18px;color:var(--t-dk);font-size:13px;margin-bottom:24px}

    .section{margin-bottom:40px}
    .sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .sec-hd-text{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx2);white-space:nowrap}
    .sec-hd-line{flex:1;height:1px;background:var(--bd)}
    .sec-count{font-size:10px;font-weight:700;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:2px 8px;color:var(--tx2);margin-right:6px}

    .card{background:var(--surf);border-radius:16px;border:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);overflow:hidden}

    .p-item{display:flex;border-bottom:1px solid var(--bd);transition:background .12s}
    .p-item:last-child{border-bottom:none}
    .p-bar{width:4px;flex-shrink:0}
    .p-bar-high{background:var(--t)}
    .p-bar-medium{background:var(--a)}
    .p-bar-low{background:var(--g)}
    .p-body{padding:18px 48px 18px 18px;flex:1;min-width:0}
    .p-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
    .p-title{font-size:14px;font-weight:700;color:var(--tx);line-height:1.35}
    .badge{font-size:10px;padding:3px 9px;border-radius:var(--r);font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
    .badge-high{background:var(--t-lt);color:var(--t-dk)}
    .badge-medium{background:var(--a-lt);color:var(--a)}
    .badge-low{background:var(--g-lt);color:var(--g)}
    .p-summary{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:4px}
    .p-bullets{list-style:none;padding:0;margin:8px 0 0;display:flex;flex-direction:column;gap:5px}
    .p-bullets li{display:flex;gap:9px;font-size:13px;color:var(--tx2);line-height:1.6}
    .p-bullets li::before{content:'•';color:var(--bd2);flex-shrink:0;font-size:15px;line-height:1.4}
    .source-pill{display:inline-flex;align-items:center;margin-top:10px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:3px 10px;font-size:11px;color:var(--tx3);text-decoration:none;transition:all .12s}
    a.source-pill{color:var(--t);border-color:var(--t-md);background:var(--t-lt)}
    a.source-pill:hover{opacity:.8;text-decoration:underline}

    .ev-group{border-bottom:1px solid var(--bd)}
    .ev-group:last-child{border-bottom:none}
    .ev-theme-bar{display:flex;align-items:center;gap:10px;padding:14px 20px 8px}
    .ev-theme-chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:3px 10px;border-radius:var(--r);background:var(--bg);color:var(--tx2);border:1px solid var(--bd2)}
    .ev-items{padding:0 20px 14px;display:flex;flex-direction:column;gap:0}
    .ev-item{display:flex;gap:13px;padding:10px 0;border-bottom:1px solid var(--bd)}
    .ev-item:last-child{border-bottom:none}
    .ev-dot-col{flex-shrink:0;padding-top:6px}
    .ev-dot{width:6px;height:6px;border-radius:50%;background:var(--t)}
    .ev-body{flex:1;min-width:0}
    .ev-heading{font-size:13.5px;font-weight:700;color:var(--tx);line-height:1.4;margin-bottom:7px}
    .ev-bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
    .ev-bullets li{display:flex;gap:9px;font-size:13px;color:var(--tx2);line-height:1.6}
    .ev-bullets li::before{content:'•';color:var(--bd2);flex-shrink:0;font-size:15px;line-height:1.4}
    .ev-src{display:inline-flex;margin-top:8px;font-size:11px;color:var(--tx3);font-style:italic;text-decoration:none}
    a.ev-src{color:var(--t)}
    a.ev-src:hover{text-decoration:underline}
    .ev-summary{font-size:13px;color:var(--tx2);line-height:1.6}

    .pe-nav{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);scrollbar-width:none;background:#FAFAF8;padding:0 4px}
    .pe-nav::-webkit-scrollbar{display:none}
    .pe-tab{display:flex;align-items:center;gap:7px;padding:12px 16px;font-size:12.5px;font-weight:500;color:var(--tx3);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
    .pe-tab:hover{color:var(--tx2)}
    .pe-tab.active{color:var(--tx);border-bottom-color:var(--t);font-weight:700}
    .pe-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;flex-shrink:0}
    .pe-tab.active .pe-avatar{box-shadow:0 0 0 2px var(--t-md)}
    .pe-panel{display:none}
    .pe-panel.active{display:block}
    .pe-item{padding:16px 48px 16px 20px;border-bottom:1px solid var(--bd)}
    .pe-item:last-child{border-bottom:none}
    .pe-item-hd{font-size:13.5px;font-weight:700;color:var(--tx);line-height:1.35;margin-bottom:8px}
    .pe-bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
    .pe-bullets li{display:flex;gap:9px;font-size:13px;color:var(--tx2);line-height:1.6}
    .pe-bullets li::before{content:'•';color:var(--bd2);flex-shrink:0;font-size:15px;line-height:1.4}
    .pe-tab-count{font-size:9px;font-weight:800;background:var(--t-lt);color:var(--t-dk);border-radius:var(--r);padding:1px 5px;min-width:14px;text-align:center;flex-shrink:0}
    .pe-tab.active .pe-tab-count{background:var(--t);color:white}
    .gap-note{background:#FFFBF2;border-left:3px solid var(--a);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#7A5010;margin:10px 0 4px}

    .itp-tag{display:inline-flex;align-items:center;margin-top:10px;border-radius:var(--r);padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

    .sel-wrap{cursor:pointer;position:relative;transition:background .12s}
    .sel-wrap:hover{background:#F7F3EF}
    .sel-wrap.selected{background:var(--t-lt)}
    .sel-indicator{position:absolute;top:16px;right:16px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .12s}
    .sel-wrap:hover .sel-indicator{border-color:var(--t)}
    .sel-wrap.selected .sel-indicator{background:var(--t);border-color:var(--t);color:white}

    .fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;background:#17140D;color:white;border-radius:var(--r);padding:10px 8px 10px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 28px rgba(0,0,0,.28);transition:opacity .2s,transform .2s;z-index:100;white-space:nowrap}
    .fab.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
    .fab-count{font-size:13px;font-weight:600}
    .fab-clear{font-size:12px;background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;transition:color .15s}
    .fab-clear:hover{color:white}
    .fab-sep{width:1px;height:18px;background:rgba(255,255,255,.18)}
    .fab-btn{background:var(--t);color:white;border:none;border-radius:var(--r);padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
    .fab-btn:hover{background:var(--t-dk)}

    .sum-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .sum-overlay.open{display:flex}
    .sum-panel{background:var(--surf);border-radius:20px 20px 0 0;padding:24px 24px 36px;width:100%;max-height:78vh;overflow-y:auto;box-shadow:0 -4px 32px rgba(0,0,0,.14)}
    .sum-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .sum-title{font-size:15px;font-weight:700;color:var(--tx)}
    .sum-close{background:var(--bg);border:1px solid var(--bd);border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .15s}
    .sum-close:hover{background:var(--bd);color:var(--tx)}
    .sum-output{font-size:13.5px;color:var(--tx);line-height:1.8;background:#FAFAF8;border:1px solid var(--bd);border-radius:12px;padding:18px 20px;word-break:break-word}
    .sum-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .sum-copy-btn{background:var(--t);color:white;border:none;border-radius:var(--r);padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
    .sum-copy-btn:hover{background:var(--t-dk)}
    .sum-copy-btn.copied{background:var(--g)}

    .empty{color:var(--tx3);font-size:13px;font-style:italic;padding:8px 0}

    .instructions{display:flex;align-items:flex-start;gap:12px;background:var(--surf);border:1px solid var(--bd);border-left:3px solid var(--t);border-radius:12px;padding:14px 16px;margin-bottom:28px;font-size:13px;color:var(--tx2);line-height:1.6}
    .inst-icon{font-size:15px;flex-shrink:0;margin-top:1px}
    .inst-text{flex:1}
    .inst-text strong{color:var(--tx);font-weight:700}
    .inst-step{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--bd2);border-radius:5px;padding:1px 7px;font-size:11px;font-weight:600;color:var(--tx2);white-space:nowrap}
    .inst-dismiss{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 0 0 4px;flex-shrink:0;line-height:1;transition:color .12s}
    .inst-dismiss:hover{color:var(--tx)}

    .filter-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:28px;align-items:center}
    .filter-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-right:2px;white-space:nowrap}
    .f-btn{padding:6px 13px;border-radius:var(--r);border:1.5px solid var(--bd2);background:var(--surf);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap}
    .f-btn:hover{border-color:var(--t);color:var(--t);background:var(--t-lt)}
    .f-btn.active{background:var(--t);border-color:var(--t);color:white;box-shadow:0 2px 8px rgba(244,93,72,.25)}

    .status-bar{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:0 16px;margin-bottom:24px;display:flex;align-items:stretch;height:40px;overflow:hidden}
    .status-bar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;padding-right:14px;border-right:1px solid var(--bd)}
    .status-row{display:flex;align-items:stretch;flex:1}
    .status-pe{display:flex;align-items:center;gap:7px;flex:1;padding:0 14px;border-right:1px solid var(--bd);min-width:0}
    .status-pe:last-child{border-right:none}
    .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .status-dot.ok{background:#34C77B}
    .status-dot.pending{background:var(--bd2)}
    .status-pe-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;overflow:hidden}
    .status-pe-name{font-size:11.5px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
    .status-pe-status{font-size:10px;color:var(--tx3);white-space:nowrap;line-height:1.2}
    .status-pe-status.ok{color:#2C7A55}
    .status-refresh-btn{font-size:11px;font-weight:700;color:var(--t);background:none;border:none;padding:0;cursor:pointer;white-space:nowrap;flex-shrink:0;opacity:.7;transition:opacity .12s;line-height:1}
    .status-refresh-btn:hover{opacity:1}
    .status-refresh-btn:disabled{opacity:.25;cursor:default}
    .status-reload{background:none;border:none;border-left:1px solid var(--bd);padding:0 14px;font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;transition:color .15s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
    .status-reload:hover{color:var(--t)}
    .status-loading{display:flex;align-items:center;gap:8px;color:var(--tx3);font-size:12px;padding:20px 0;justify-content:center}
    .status-spinner{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--t);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- Floating action bar -->
<div class="fab" id="fab">
  <span class="fab-count" id="fabCount">0 selected</span>
  <button class="fab-clear" onclick="clearSelection()">Clear</button>
  <div class="fab-sep"></div>
  <button class="fab-btn" id="fabBtn" onclick="openSummary()">✦ Summarize for Slack</button>
</div>

<!-- Summary panel -->
<div class="sum-overlay" id="sumOverlay" onclick="if(event.target===this)closeSummary()">
  <div class="sum-panel">
    <div class="sum-header">
      <div class="sum-title">Slack summary</div>
      <button class="sum-close" onclick="closeSummary()">✕</button>
    </div>
    <div id="sumOutput" class="sum-output" style="display:none"></div>
    <div class="sum-actions" id="sumActions" style="display:none">
      <button class="sum-copy-btn" id="sumCopyBtn" onclick="copySummary()">📋 Copy message</button>
    </div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="g-mark">G</div>
      <div class="brand-info">
        <div class="brand-title">Weekly recruiting recap</div>
        <div class="brand-meta">
          <div class="brand-sub" id="sub">Invite PE team</div>
          <div class="week-chip" id="weekChip"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="page-body">
  <div id="errBox" class="error-box" style="display:none"></div>
  <div id="content">
    <div class="status-loading"><div class="status-spinner"></div>&nbsp;Loading latest data…</div>
  </div>
</div>

<script>
  // ── GitHub config ────────────────────────────────────────────────────────────
  const GH = { owner: 'jaimetavarez1', repo: 'invite-weekly-recap' };

  async function ghFetch(path) {
    try {
      const r = await fetch(
        `https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/main/${path}?t=${Date.now()}`,
        { cache: 'no-store' }
      );
      if (!r.ok) return null;
      const data = await r.json();
      return { data };
    } catch(e) { return null; }
  }

  // ── PE metadata ──────────────────────────────────────────────────────────────
  const PE_META = {
    jaime:    { label: 'Jaime',    sub: 'R&D',        initials: 'JT', bg: '#FEF0EE', color: '#C63627' },
    teresa:   { label: 'Teresa',   sub: 'Foundation', initials: 'TW', bg: '#E8F5EF', color: '#2C7A55' },
    lisa:     { label: 'Lisa',     sub: 'GTM',        initials: 'LP', bg: '#FEF4E6', color: '#C47A15' },
    michelle: { label: 'Michelle', sub: 'CX',         initials: 'MC', bg: '#EEF2FB', color: '#3B6FD4' },
    kebone:   { label: 'Kebone',   sub: 'PM/PD',      initials: 'KM', bg: '#F2EDFB', color: '#7C4FBF' }
  };

  const PE_CHANNELS = {
    jaime:    { channels: ['C05V6DJ5QPQ','C08SVC00BLN','C0706MX3Q6B','C0B0PPHSCUA'] },
    teresa:   { channels: [] },
    lisa:     { channels: [] },
    michelle: { channels: [] },
    kebone:   { channels: [] }
  };

  const ORG_FILTERS = [
    { key: 'all',        label: 'All' },
    { key: 'r&d',        label: 'Jaime · R&D' },
    { key: 'foundation', label: 'Teresa · Foundation' },
    { key: 'gtm',        label: 'Lisa · GTM' },
    { key: 'cx',         label: 'Michelle · CX' },
    { key: 'pm',         label: 'Kebone · PM/PD' }
  ];

  const ORG_TO_PE = { 'r&d': 'jaime', foundation: 'teresa', gtm: 'lisa', cx: 'michelle', pm: 'kebone' };

  let activeFilter = 'all';
  let selIdCounter = 0;
  let summaryText = '';

  // ── Data loading ─────────────────────────────────────────────────────────────
  async function loadAllData() {
    const peKeys = Object.keys(PE_META);
    const [sharedResult, ...peResults] = await Promise.all([
      ghFetch('data/shared.json'),
      ...peKeys.map(k => ghFetch(`data/${k}.json`))
    ]);
    const peFiles = {};
    peKeys.forEach((k, i) => { peFiles[k] = peResults[i]; });
    return { shared: sharedResult, peFiles };
  }

  function mergeData(shared, peFiles) {
    const orgPolicy = shared?.data?.orgPolicy || [];
    const keyEvents = shared?.data?.keyEvents || [];
    const peOrgUpdates = {};
    Object.keys(PE_META).forEach(k => {
      const f = peFiles[k];
      peOrgUpdates[k] = {
        updates:   f?.data?.updates || [],
        sourceGap: f ? null : 'This PE has not refreshed yet this week.'
      };
    });
    return { orgPolicy, keyEvents, peOrgUpdates };
  }

  // ── Relative time ────────────────────────────────────────────────────────────
  function relTime(iso) {
    if (!iso) return null;
    const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (diff < 2)  return 'just now';
    if (diff < 60) return `${diff}m ago`;
    const h = Math.floor(diff / 60);
    if (h < 24)    return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  // ── HTML helpers ─────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmt(s) {
    return esc(s)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }
  function spill(source, url) {
    if (url) return `<a href="${esc(url)}" class="source-pill" target="_blank">${esc(source)}</a>`;
    return `<span class="source-pill">${esc(source)}</span>`;
  }
  function orgAttr(tags) {
    return `data-orgs="${(tags || ['all']).join(',')}"`;
  }
  function itpHtml(tp) {
    if (!tp) return '';
    const clr = tp.priority === 'red' ? 'red' : tp.priority === 'yellow' ? 'yellow' : 'green';
    const lbl = clr === 'red' ? 'Action required' : clr === 'yellow' ? 'Cascade this week' : 'FYI';
    const style = {
      red:    'background:var(--t-lt);color:var(--t-dk);border:1px solid var(--t-md)',
      yellow: 'background:var(--a-lt);color:#8A5210;border:1px solid #F5C87A',
      green:  'background:var(--g-lt);color:var(--g);border:1px solid #A8D9BE'
    }[clr];
    return `<span class="itp-tag" style="${style}">${lbl}</span>`;
  }
  function selWrap(inner, summaryContent) {
    const id = 'sw-' + (selIdCounter++);
    const safe = (summaryContent || '').replace(/"/g, '&quot;');
    return `<div class="sel-wrap" id="${id}" data-summary="${safe}" onclick="toggleSel(this)">
      ${inner}
      <div class="sel-indicator">✓</div>
    </div>`;
  }

  // ── Slack summary formatter ──────────────────────────────────────────────────
  function applyInline(t) {
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>')
      .replace(/_([^_\n]+)_/g, '<em>$1</em>');
  }
  function slackFmt(text) {
    const lines = String(text || '').replace(/\\n/g, '\n').split('\n');
    let html = '';
    for (const line of lines) {
      const t = line.trim();
      if (!t) { html += '<div style="height:6px"></div>'; continue; }
      if (/^\*[^*].+[^*]\*$/.test(t) || /^\*\*[^*].+[^*]\*\*$/.test(t)) {
        html += `<div style="font-size:15px;font-weight:700;color:var(--tx);margin-bottom:4px">${applyInline(t)}</div>`;
      } else if (/^_[^_]+_$/.test(t)) {
        const label = t.replace(/^_|_$/g, '');
        html += `<div style="font-style:italic;font-weight:600;font-size:14px;color:var(--tx2);margin:10px 0 4px">${esc(label)}</div>`;
      } else if (/^[•\-]\s/.test(t)) {
        const inner = t.replace(/^[•\-]\s*/, '');
        html += `<div style="display:flex;gap:9px;padding:4px 0"><span style="flex-shrink:0;margin-top:1px">•</span><span style="font-size:13.5px;color:var(--tx)">${applyInline(inner)}</span></div>`;
      } else {
        html += `<div style="font-size:13.5px;color:var(--tx);padding:2px 0">${applyInline(t)}</div>`;
      }
    }
    return html;
  }

  // ── Selection ────────────────────────────────────────────────────────────────
  function toggleSel(el) {
    el.classList.toggle('selected');
    const count = document.querySelectorAll('.sel-wrap.selected').length;
    document.getElementById('fabCount').textContent = count + (count === 1 ? ' item selected' : ' items selected');
    document.getElementById('fab').classList.toggle('show', count > 0);
  }
  function clearSelection() {
    document.querySelectorAll('.sel-wrap.selected').forEach(el => el.classList.remove('selected'));
    document.getElementById('fab').classList.remove('show');
  }
  function openSummary() {
    const selected = [];
    document.querySelectorAll('.sel-wrap.selected').forEach(el => {
      if (el.dataset.summary) selected.push(el.dataset.summary);
    });
    if (!selected.length) return;
    const asks = [], updates = [];
    selected.forEach(text => {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      if (!lines.length) return;
      const heading = lines[0].replace(/\*\*(.+?)\*\*/g, '$1');
      const bullets = lines.slice(1);
      let line = `• 🎯 *${heading}*`;
      if (bullets.length) {
        const desc = bullets[0].replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1').slice(0, 90);
        if (desc) line = `• 🎯 *${heading}* — ${desc}`;
      }
      updates.push(line);
    });
    let msg = "*This week's round-up 👇*\n\n";
    if (updates.length) msg += '_Updates_\n' + updates.join('\n') + '\n\n';
    msg += "Please reply with a *yes* once you've read through! 🙌";
    summaryText = msg;
    document.getElementById('sumOutput').innerHTML = slackFmt(summaryText);
    document.getElementById('sumOutput').style.display = 'block';
    document.getElementById('sumActions').style.display = 'flex';
    document.getElementById('sumOverlay').classList.add('open');
  }
  function closeSummary() {
    document.getElementById('sumOverlay').classList.remove('open');
  }
  function copySummary() {
    navigator.clipboard.writeText(summaryText).then(() => {
      const btn = document.getElementById('sumCopyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '📋 Copy message'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── Filter ───────────────────────────────────────────────────────────────────
  function setFilter(org) {
    activeFilter = org;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.dataset.org === org));
    document.querySelectorAll('[data-orgs]').forEach(el => {
      const orgs = el.dataset.orgs.split(',');
      el.classList.toggle('hidden-item', org !== 'all' && !orgs.includes('all') && !orgs.includes(org));
    });
    if (org !== 'all' && ORG_TO_PE[org]) switchPE(ORG_TO_PE[org]);
  }

  // ── PE tab switching ─────────────────────────────────────────────────────────
  function switchPE(key) {
    document.querySelectorAll('.pe-tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
    document.querySelectorAll('.pe-panel').forEach(p => p.classList.toggle('active', p.dataset.key === key));
  }

  // ── Banner dismiss ───────────────────────────────────────────────────────────
  function dismissBanner() {
    window._instrDismissed = true;
    const b = document.getElementById('instrBanner');
    if (b) b.style.display = 'none';
  }

  // ── PE refresh ───────────────────────────────────────────────────────────────
  function refreshPE(peKey) {
    const meta = PE_META[peKey];
    if (typeof sendPrompt === 'function') {
      sendPrompt(`Update the weekly recap with fresh data for ${meta.label}'s org (${meta.sub}). Push to data/${peKey}.json on GitHub and refresh the artifact.`);
    } else {
      alert(`To refresh ${meta.label}'s org data:\n\n1. Open Cowork on your computer\n2. Run the Weekly Recap skill\n3. Reload this page to see updated data`);
    }
  }

  // ── Render status bar ─────────────────────────────────────────────────────────
  function renderStatusBar(shared, peFiles) {
    let h = `<div class="status-bar" id="statusBar">
      <span class="status-bar-label">PE Status</span>
      <div class="status-row">`;
    Object.keys(PE_META).forEach(k => {
      const meta  = PE_META[k];
      const f     = peFiles[k];
      const ts    = f?.data?.refreshedAt;
      const isOk  = !!ts;
      const hasCh = (PE_CHANNELS[k]?.channels?.length || 0) > 0;
      h += `<div class="status-pe">
        <div class="status-dot ${isOk ? 'ok' : 'pending'}"></div>
        <div class="status-pe-info">
          <span class="status-pe-name">${meta.label}</span>
          <span class="status-pe-status ${isOk ? 'ok' : ''}">${isOk ? relTime(ts) : 'Not refreshed'}</span>
        </div>
        ${hasCh ? `<button class="status-refresh-btn" onclick="refreshPE('${k}')" title="Refresh ${meta.label}'s org">↻</button>` : ''}
      </div>`;
    });
    h += `</div>
      <button class="status-reload" onclick="triggerReload()">↻ Reload</button>
    </div>`;
    return h;
  }

  // ── Render recap content ─────────────────────────────────────────────────────
  function renderRecap(data) {
    let h = '';

    // Instructions banner
    if (!window._instrDismissed) {
      h += `<div class="instructions" id="instrBanner">
        <span class="inst-icon">💡</span>
        <div class="inst-text">
          <strong>Summarize for Slack</strong> — click any card to select it (checkmark appears), then press <span class="inst-step">Summarize for Slack →</span> in the bottom bar. Your message is ready instantly.
        </div>
        <button class="inst-dismiss" onclick="dismissBanner()" title="Dismiss">✕</button>
      </div>`;
    }

    // Filter bar
    h += `<div class="filter-bar">
      <span class="filter-lbl">Filter by org:</span>
      ${ORG_FILTERS.map(f => `<button class="f-btn${f.key === 'all' ? ' active' : ''}" data-org="${f.key}" onclick="setFilter('${f.key}')">${f.label}</button>`).join('')}
    </div>`;

    // PE Org Updates
    const peKeys = Object.keys(PE_META);
    h += `<div class="section">
      <div class="sec-hd"><span class="sec-hd-text">PE org updates</span><div class="sec-hd-line"></div></div>
      <div class="card"><div class="pe-nav">`;
    peKeys.forEach((k, i) => {
      const pe  = (data.peOrgUpdates || {})[k] || { updates: [] };
      const cnt = (pe.updates || []).length;
      h += `<button class="pe-tab${i === 0 ? ' active' : ''}" data-key="${k}" onclick="switchPE('${k}')">
        <div class="pe-avatar" style="background:${PE_META[k].bg};color:${PE_META[k].color}">${PE_META[k].initials}</div>
        <span>${PE_META[k].label}</span>
        ${cnt > 0 ? `<span class="pe-tab-count">${cnt}</span>` : ''}
      </button>`;
    });
    h += `</div>`;
    peKeys.forEach((k, i) => {
      const pe = (data.peOrgUpdates || {})[k] || { updates: [], sourceGap: null };
      h += `<div class="pe-panel${i === 0 ? ' active' : ''}" data-key="${k}">`;
      if (pe.updates && pe.updates.length) {
        pe.updates.forEach(u => {
          if (typeof u === 'object' && u.heading) {
            const inner = `<div class="pe-item">
              <div class="pe-item-hd">${fmt(u.heading)}</div>
              ${u.bullets && u.bullets.length ? `<ul class="pe-bullets">` + u.bullets.map(b => `<li>${fmt(b)}</li>`).join('') + `</ul>` : ''}
            </div>`;
            h += selWrap(inner, u.heading + (u.bullets ? '\n' + u.bullets.join('\n') : ''));
          } else {
            h += selWrap(`<div class="pe-item"><div class="pe-item-hd">${fmt(u)}</div></div>`, String(u));
          }
        });
      } else {
        h += `<div style="padding:16px 22px" class="empty">No specific updates this week.</div>`;
      }
      if (pe.sourceGap) {
        h += `<div class="gap-note" style="margin:0 12px 12px">⚠️ ${esc(pe.sourceGap)}</div>`;
      }
      h += `</div>`;
    });
    h += `</div></div>`;

    // Org & Policy Updates
    const policyItems = data.orgPolicy || [];
    h += `<div class="section">
      <div class="sec-hd">
        <span class="sec-hd-text">Org &amp; policy updates</span>
        ${policyItems.length ? `<span class="sec-count">${policyItems.length}</span>` : ''}
        <div class="sec-hd-line"></div>
      </div>
      <div class="card">`;
    if (policyItems.length) {
      policyItems.forEach(item => {
        const p    = (item.priority || 'medium').toLowerCase();
        const tags = item.tags || ['all'];
        const inner = `<div class="p-item" ${orgAttr(tags)}>
          <div class="p-bar p-bar-${p}"></div>
          <div class="p-body">
            <div class="p-row1">
              <span class="p-title">${fmt(item.title)}</span>
              <span class="badge badge-${p}">${p}</span>
            </div>
            ${item.summary ? `<div class="p-summary">${fmt(item.summary)}</div>` : ''}
            ${item.bullets && item.bullets.length ? `<ul class="p-bullets">` + item.bullets.map(b => `<li>${fmt(b)}</li>`).join('') + `</ul>` : ''}
            ${item.source ? spill(item.source, item.sourceUrl) : ''}
            ${itpHtml(item.tp)}
          </div>
        </div>`;
        h += selWrap(inner, item.title + (item.bullets ? '\n' + item.bullets.join('\n') : ''));
      });
    } else {
      h += `<div style="padding:18px 22px" class="empty">No policy updates this week.</div>`;
    }
    h += `</div></div>`;

    // Key Events & Decisions
    const evGroups = data.keyEvents || [];
    const evTotal  = evGroups.reduce((s, g) => s + (g.items || []).length, 0);
    h += `<div class="section">
      <div class="sec-hd">
        <span class="sec-hd-text">Key events &amp; decisions</span>
        ${evTotal ? `<span class="sec-count">${evTotal}</span>` : ''}
        <div class="sec-hd-line"></div>
      </div>
      <div class="card">`;
    if (evGroups.length) {
      evGroups.forEach(g => {
        h += `<div class="ev-group" ${orgAttr(g.tags || ['all'])}>
          <div class="ev-theme-bar"><span class="ev-theme-chip">${esc(g.theme)}</span></div>
          <div class="ev-items">`;
        (g.items || []).forEach(it => {
          const srcHtml = it.source
            ? (it.sourceUrl
              ? `<a href="${esc(it.sourceUrl)}" class="ev-src" target="_blank">${esc(it.source)}</a>`
              : `<span class="ev-src">${esc(it.source)}</span>`)
            : '';
          const inner = `<div class="ev-item">
            <div class="ev-dot-col"><div class="ev-dot"></div></div>
            <div class="ev-body">
              <div class="ev-heading">${fmt(it.heading || it.summary || '')}</div>
              ${it.bullets && it.bullets.length ? `<ul class="ev-bullets">` + it.bullets.map(b => `<li>${fmt(b)}</li>`).join('') + `</ul>` : ''}
              ${srcHtml}${itpHtml(it.tp)}
            </div>
          </div>`;
          h += selWrap(inner, (it.heading || it.summary || '') + (it.bullets ? '\n' + it.bullets.join('\n') : ''));
        });
        h += `</div></div>`;
      });
    } else {
      h += `<div style="padding:18px 22px" class="empty">No major events this week.</div>`;
    }
    h += `</div></div>`;

    return h;
  }

  // ── Reload button handler ────────────────────────────────────────────────────
  // In Cowork: triggers the weekly recap skill via sendPrompt
  // On GitHub Pages: prompts user to open Cowork
  function triggerReload() {
    if (typeof sendPrompt === 'function') {
      // Inside Cowork — trigger skill directly
      sendPrompt('run my weekly recap');
    } else {
      // Show modal first, then open Claude on confirm
      navigator.clipboard.writeText('run my weekly recap').catch(() => {});
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center';
      const isSetup = localStorage.getItem('invite-recap-setup');
      overlay.innerHTML = `
        <div style="background:white;border-radius:16px;padding:28px 28px 22px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center">
          <div style="font-size:28px;margin-bottom:12px">📋</div>
          <div style="font-size:15px;font-weight:700;color:#17140D;margin-bottom:8px">Ready to refresh</div>
          <div style="font-size:13px;color:#57504A;line-height:1.6;margin-bottom:20px">
            We've copied <strong>"run my weekly recap"</strong> to your clipboard.<br><br>
            Click <strong>Open Claude</strong> below, then paste <strong>⌘V</strong> and hit Enter to run the skill.
          </div>
          <button id="openClaudeBtn" style="background:#F45D48;color:white;border:none;border-radius:999px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px">Open Claude →</button>
          ${!isSetup ? `
          <div style="border-top:1px solid #E2DBD3;padding-top:14px;margin-top:4px">
            <div style="font-size:12px;color:#A09890;margin-bottom:8px">First time? You'll need the plugin installed first.</div>
            <a href="https://app.notion.com/p/379ad673c6c281f89e7ff05bfb579f26" target="_blank" onclick="localStorage.setItem('invite-recap-setup','true')"
              style="display:inline-block;font-size:12px;font-weight:700;color:#F45D48;text-decoration:none;border:1.5px solid #FBCFC9;border-radius:999px;padding:6px 16px;background:#FEF0EE">
              🛠️ Get set up first →
            </a>
          </div>` : ''}
          <div style="margin-top:10px"><button onclick="this.closest('[style*=fixed]').remove()" style="background:none;border:none;color:#A09890;font-size:12px;cursor:pointer">Cancel</button></div>
        </div>`;
      document.body.appendChild(overlay);
      document.getElementById('openClaudeBtn').onclick = () => {
        overlay.remove();
        window.location.href = 'claude://';
      };
    }
  }

  // ── Main load/render ─────────────────────────────────────────────────────────
  async function reloadAll() {
    document.getElementById('errBox').style.display = 'none';
    document.getElementById('content').innerHTML =
      `<div class="status-loading"><div class="status-spinner"></div>&nbsp;Loading latest data…</div>`;

    try {
      const { shared, peFiles } = await loadAllData();
      const merged = mergeData(shared, peFiles);

      selIdCounter = 0; // reset IDs for fresh render

      const statusHtml = renderStatusBar(shared, peFiles);
      const recapHtml  = renderRecap(merged);

      document.getElementById('content').innerHTML = statusHtml + recapHtml;

      const week = shared?.data?.week || '';
      const wc = document.getElementById('weekChip');
      if (wc && week) wc.textContent = week;

      document.getElementById('sub').textContent =
        'Invite PE team · Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      // Re-apply active filter after re-render
      if (activeFilter !== 'all') setFilter(activeFilter);

    } catch(err) {
      document.getElementById('content').innerHTML = '';
      const eb = document.getElementById('errBox');
      eb.style.display = 'block';
      eb.innerHTML = `<strong>⚠️ Could not load data</strong><br><span style="font-size:12px">${esc(err.message)}</span>`;
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  reloadAll();
</script>
</body>
</html>
